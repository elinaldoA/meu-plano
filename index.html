<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IronFit — Treino & Dieta</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <meta name="theme-color" content="#0e0e12">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="description" content="Plano de treino e dieta personalizado com sync em nuvem">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="shell">

    <!-- ── Tela de Login (padrão) ── -->
    <div id="authScreen" class="auth-screen">
        <div class="auth-inner">
            <div class="auth-logo">
                <div class="auth-logo__icon">⚡</div>
                <div class="auth-logo__name">IRONFIT</div>
                <p class="auth-logo__tagline">Treino e dieta em um só lugar</p>
            </div>
            <div class="auth-form">
                <input type="email"    id="emailInput"    class="input" placeholder="E-mail" autocomplete="email">
                <input type="password" id="passwordInput" class="input" placeholder="Senha"  autocomplete="current-password">
                <button id="loginBtn"  class="btn btn--primary btn--full">Entrar</button>
                <button id="signupBtn" class="btn btn--outline  btn--full">Criar conta</button>
                <p id="authMessage" class="auth-form__msg"></p>
            </div>
        </div>
    </div>

    <!-- ── App (visível após login) ── -->
    <div id="appScreen" class="app-screen" style="display:none">

        <!-- Barra superior -->
        <header class="topbar">
            <span class="topbar__brand">⚡ IRONFIT</span>
            <div id="headerAuth" class="topbar__auth"></div>
        </header>

        <!-- Área de conteúdo -->
        <main class="pages">

            <!-- Página: Treino -->
            <section id="page-treino" class="page active">
                <div class="progress-card">
                    <div class="progress-card__row">
                        <span class="progress-card__label">Semana atual</span>
                        <span id="weekProgressLabel" class="progress-card__count">0/5 treinos</span>
                    </div>
                    <div class="progress-card__bar">
                        <div id="weekProgressFill" class="progress-card__fill"></div>
                    </div>
                </div>
                <div class="toolbar">
                    <p class="toolbar__hint">Marque os treinos · salva automático</p>
                    <button class="btn btn--ghost btn--sm" id="resetTreinos">Limpar</button>
                </div>
                <div id="treinoContainer"></div>
                <footer class="footer">
                    <strong>Progressão:</strong> aumente cargas toda semana &nbsp;·&nbsp; <strong>Deload</strong> na semana 6
                </footer>
            </section>

            <!-- Página: Dieta -->
            <section id="page-dieta" class="page">
                <div id="macrosGrid" class="macros"></div>
                <div id="dietaContainer" class="meals"></div>
            </section>

        </main>

        <!-- Navegação inferior -->
        <nav class="bottom-nav">
            <button class="nav-item active" data-page="treino">
                <svg class="nav-item__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="10" width="4" height="4" rx="1"/>
                    <rect x="18" y="10" width="4" height="4" rx="1"/>
                    <rect x="6" y="7" width="2" height="10" rx="1"/>
                    <rect x="16" y="7" width="2" height="10" rx="1"/>
                    <line x1="8" y1="12" x2="16" y2="12"/>
                </svg>
                <span>Treino</span>
            </button>
            <button class="nav-item" data-page="dieta">
                <svg class="nav-item__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 2v7c0 1.1.9 2 2 2s2-.9 2-2V2"/>
                    <line x1="5" y1="11" x2="5" y2="22"/>
                    <path d="M21 2v20"/>
                    <path d="M21 7H15a2 2 0 0 0-2 2v4a2 2 0 0 0 2 2h6"/>
                </svg>
                <span>Dieta</span>
            </button>
        </nav>

    </div>

</div>

<div id="toast" class="toast" role="status" aria-live="polite"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
</body>
</html>

<html lang="pt-br">

    <link rel="manifest" href="manifest.json">
    <!-- Tema para a barra de status do Android -->
    <meta name="theme-color" content="#0e0e12">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        body {
            background-color: #0e0e12;
            color: #e4e4e7;
            padding: 16px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 900px;
            width: 100%;
            background: #18181b;
            border-radius: 32px;
            padding: 24px 20px 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.7);
            border: 1px solid #2a2a2e;
        }

        /* HEADER */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 28px;
            border-bottom: 1px solid #2a2a2e;
            padding-bottom: 16px;
        }
        .header h1 {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #f97316, #fb923c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header .badge {
            background: #27272a;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #a1a1aa;
            border: 1px solid #3f3f46;
        }
        .header .badge strong {
            color: #f97316;
            font-weight: 700;
        }

        /* TABS */
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 28px;
            background: #27272a;
            padding: 6px;
            border-radius: 40px;
        }
        .tab-btn {
            flex: 1;
            padding: 10px 0;
            border: none;
            background: transparent;
            color: #a1a1aa;
            font-weight: 700;
            font-size: 0.95rem;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.2s;
        }
        .tab-btn.active {
            background: #f97316;
            color: #09090b;
            box-shadow: 0 4px 12px rgba(249, 115, 22, 0.3);
        }
        .tab-btn:hover:not(.active) {
            color: #e4e4e7;
        }

        .tab-content {
            display: none;
            animation: fadeUp 0.3s ease;
        }
        .tab-content.active {
            display: block;
        }

        @keyframes fadeUp {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* DIETA - Resumo */
        .macro-summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 10px;
            background: #1c1c21;
            padding: 16px;
            border-radius: 20px;
            margin-bottom: 28px;
            border: 1px solid #2a2a2e;
        }
        .macro-item {
            text-align: center;
        }
        .macro-item .value {
            display: block;
            font-size: 1.4rem;
            font-weight: 800;
            color: #f97316;
        }
        .macro-item .label {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: #71717a;
            letter-spacing: 0.5px;
        }

        /* TIMELINE DIETA */
        .timeline {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .meal-card {
            display: flex;
            gap: 16px;
            background: #1c1c21;
            border-radius: 20px;
            padding: 16px 18px;
            border-left: 5px solid #f97316;
            align-items: flex-start;
            border: 1px solid #2a2a2e;
            border-left-width: 5px;
        }
        .meal-time {
            min-width: 60px;
            font-weight: 700;
            color: #f97316;
            font-size: 0.9rem;
            padding-top: 2px;
        }
        .meal-content {
            flex: 1;
        }
        .meal-name {
            font-weight: 700;
            font-size: 1rem;
            color: #e4e4e7;
            margin-bottom: 4px;
        }
        .meal-desc {
            font-size: 0.9rem;
            color: #a1a1aa;
            line-height: 1.5;
        }
        .meal-desc strong {
            color: #fbbf24;
        }
        .meal-icon {
            font-size: 1.5rem;
            line-height: 1;
        }
        .water-highlight {
            background: #1e293b;
            border-left-color: #38bdf8;
            margin-top: 8px;
        }
        .water-highlight .meal-time {
            color: #38bdf8;
        }

        /* TREINO - ACCORDION */
        .day-accordion {
            background: #1c1c21;
            border-radius: 16px;
            margin-bottom: 12px;
            border: 1px solid #2a2a2e;
            overflow: hidden;
        }
        .day-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 18px;
            cursor: pointer;
            background: #1c1c21;
            transition: 0.15s;
            user-select: none;
        }
        .day-header:hover {
            background: #24242b;
        }
        .day-header .day-name {
            font-weight: 700;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .day-header .day-name .check-indicator {
            color: #4ade80;
            font-size: 1.2rem;
        }
        .day-header .day-meta {
            font-size: 0.8rem;
            color: #71717a;
        }
        .day-body {
            padding: 0 18px 18px;
            display: none;
            border-top: 1px solid #2a2a2e;
        }
        .day-body.open {
            display: block;
        }

        .exercise-row {
            display: grid;
            grid-template-columns: 1fr 0.6fr 0.6fr 0.7fr 1.2fr;
            gap: 6px;
            padding: 8px 0;
            border-bottom: 1px solid #26262b;
            font-size: 0.8rem;
            align-items: center;
        }
        .exercise-row.header-row {
            color: #71717a;
            font-weight: 600;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            border-bottom: 2px solid #3f3f46;
        }
        .exercise-row .ex-name {
            font-weight: 600;
            color: #e4e4e7;
        }
        .exercise-row .ex-detail {
            color: #a1a1aa;
        }
        .exercise-row .carga-input {
            width: 50px;
            background: #0e0e12;
            border: 1px solid #3f3f46;
            border-radius: 6px;
            color: #e4e4e7;
            padding: 4px 2px;
            text-align: center;
            font-size: 0.75rem;
        }
        .exercise-row .carga-input:focus {
            outline: 2px solid #f97316;
            border-color: transparent;
        }
        .sub-section {
            font-weight: 700;
            color: #fbbf24;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 12px 0 4px;
            border-bottom: 1px dashed #3f3f46;
            margin-top: 6px;
        }
        .checkbox-treino {
            width: 18px;
            height: 18px;
            accent-color: #f97316;
            cursor: pointer;
            margin-right: 8px;
        }
        .flex-row {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .rest-indicator {
            background: #27272a;
            padding: 0px 8px;
            border-radius: 20px;
            font-size: 0.65rem;
            color: #a1a1aa;
        }

        /* RESPONSIVE */
        @media (max-width: 600px) {
            .exercise-row {
                grid-template-columns: 1fr;
                gap: 2px;
                padding: 10px 0;
                border-bottom: 1px solid #26262b;
            }
            .exercise-row.header-row {
                display: none;
            }
            .exercise-row .ex-detail {
                font-size: 0.7rem;
                color: #a1a1aa;
            }
            .exercise-row .ex-detail span {
                display: inline-block;
                background: #27272a;
                padding: 0px 8px;
                border-radius: 12px;
                margin-right: 4px;
            }
            .exercise-row .carga-input {
                width: 60px;
                margin-top: 4px;
            }
            .day-header {
                flex-wrap: wrap;
            }
            .meal-card {
                flex-wrap: wrap;
            }
            .meal-time {
                min-width: 50px;
            }
        }

        .footer-note {
            margin-top: 30px;
            text-align: center;
            font-size: 0.7rem;
            color: #52525b;
            border-top: 1px solid #27272a;
            padding-top: 20px;
        }
        .footer-note strong {
            color: #f97316;
        }

        .btn-reset {
            background: #3f3f46;
            border: none;
            color: #e4e4e7;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.7rem;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 4px;
        }
        .btn-reset:hover {
            background: #52525b;
        }
    </style>
</head>

    // --- Treino ---
    function renderTreino() {
        const container = document.getElementById('treinoContainer');
        container.innerHTML = '';

        treinoData.forEach((day, idx) => {
            const accordion = document.createElement('div');
            accordion.className = 'day-accordion';

            const header = document.createElement('div');
            header.className = 'day-header';

            const nameDiv = document.createElement('div');
            nameDiv.className = 'day-name';

            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.className = 'checkbox-treino';
            checkbox.dataset.day = day.dia;
            const saved = localStorage.getItem(`treino_${day.dia}`);
            if (saved === 'true') checkbox.checked = true;

            checkbox.addEventListener('change', (e) => {
                localStorage.setItem(`treino_${day.dia}`, e.target.checked);
                updateIndicator(day.dia, indicatorSpan);
            });

            const indicatorSpan = document.createElement('span');
            indicatorSpan.className = 'check-indicator';
            indicatorSpan.textContent = checkbox.checked ? '✅' : '⬜';
            updateIndicator(day.dia, indicatorSpan);

            function updateIndicator(dia, span) {
                const isChecked = localStorage.getItem(`treino_${dia}`) === 'true';
                span.textContent = isChecked ? '✅' : '⬜';
            }

            const nameText = document.createElement('span');
            nameText.textContent = `${day.dia} · ${day.foco}`;

            nameDiv.appendChild(checkbox);
            nameDiv.appendChild(indicatorSpan);
            nameDiv.appendChild(nameText);

            const meta = document.createElement('span');
            meta.className = 'day-meta';
            meta.textContent = `${day.exercicios.length} exercícios`;

            header.appendChild(nameDiv);
            header.appendChild(meta);

            const body = document.createElement('div');
            body.className = 'day-body';

            const headerRow = document.createElement('div');
            headerRow.className = 'exercise-row header-row';
            headerRow.innerHTML = `
                <span>Exercício</span>
                <span>Séries</span>
                <span>Reps</span>
                <span>Descanso</span>
                <span>Carga (Sem1-4)</span>
            `;
            body.appendChild(headerRow);

            day.exercicios.forEach(ex => {
                const row = document.createElement('div');
                row.className = 'exercise-row';
                row.innerHTML = `
                    <span class="ex-name">${ex.nome}</span>
                    <span class="ex-detail"><span>${ex.series}</span></span>
                    <span class="ex-detail"><span>${ex.reps}</span></span>
                    <span class="ex-detail"><span>${ex.descanso}</span></span>
                    <span class="ex-detail">
                        <input class="carga-input" type="text" placeholder="kg" data-day="${day.dia}" data-ex="${ex.nome}">
                    </span>
                `;
                const input = row.querySelector('.carga-input');
                const savedCarga = localStorage.getItem(`carga_${day.dia}_${ex.nome}`);
                if (savedCarga) input.value = savedCarga;
                input.addEventListener('change', (e) => {
                    localStorage.setItem(`carga_${day.dia}_${ex.nome}`, e.target.value);
                });
                body.appendChild(row);
            });

            if (day.pos && day.pos.length > 0) {
                const subTitle = document.createElement('div');
                subTitle.className = 'sub-section';
                subTitle.textContent = '🏁 Pós-treino (Cardio + Abdômen)';
                body.appendChild(subTitle);

                day.pos.forEach(p => {
                    const row = document.createElement('div');
                    row.className = 'exercise-row';
                    row.innerHTML = `
                        <span class="ex-name">${p.nome}</span>
                        <span class="ex-detail" style="grid-column: span 4;">${p.detalhe}</span>
                    `;
                    body.appendChild(row);
                });
            }

            let isOpen = false;
            header.addEventListener('click', (e) => {
                if (e.target.type === 'checkbox') return;
                isOpen = !isOpen;
                body.classList.toggle('open', isOpen);
            });

            accordion.appendChild(header);
            accordion.appendChild(body);
            container.appendChild(accordion);
        });
    }

    // --- Dieta ---
    function renderDieta() {
        const container = document.getElementById('dietaContainer');
        container.innerHTML = '';

        dietaData.forEach(meal => {
            const card = document.createElement('div');
            card.className = 'meal-card';
            if (meal.isWater) card.classList.add('water-highlight');

            const timeDiv = document.createElement('div');
            timeDiv.className = 'meal-time';
            timeDiv.textContent = meal.horario;

            const content = document.createElement('div');
            content.className = 'meal-content';

            const nameDiv = document.createElement('div');
            nameDiv.className = 'meal-name';
            nameDiv.textContent = meal.nome;

            const descDiv = document.createElement('div');
            descDiv.className = 'meal-desc';
            descDiv.innerHTML = meal.descricao;

            content.appendChild(nameDiv);
            content.appendChild(descDiv);
            card.appendChild(timeDiv);
            card.appendChild(content);
            container.appendChild(card);
        });
    }

    // ============================================================
    // 4. TABS E RESET
    // ============================================================

    function initTabs() {
        const buttons = document.querySelectorAll('.tab-btn');
        const contents = {
            treino: document.getElementById('tab-treino'),
            dieta: document.getElementById('tab-dieta')
        };

        buttons.forEach(btn => {
            btn.addEventListener('click', () => {
                buttons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                const target = btn.dataset.tab;
                Object.keys(contents).forEach(key => {
                    contents[key].classList.toggle('active', key === target.replace('tab-', ''));
                });
            });
        });
    }

    document.getElementById('resetTreinos').addEventListener('click', () => {
        if (confirm('Limpar todos os checkboxes de treino e cargas salvas?')) {
            const keys = Object.keys(localStorage);
            keys.forEach(key => {
                if (key.startsWith('treino_') || key.startsWith('carga_')) {
                    localStorage.removeItem(key);
                }
            });
            renderTreino();
        }
    });

    // ============================================================
    // 5. SERVICE WORKER - REGISTRO PWA (CORRIGIDO)
    // ============================================================
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            // Usa caminho relativo para funcionar em subdiretórios
            navigator.serviceWorker.register('./sw.js')
                .then(registration => {
                    console.log('✅ Service Worker registrado com sucesso!', registration);
                })
                .catch(err => {
                    console.error('❌ Falha ao registrar Service Worker:', err);
                });
        });
    }

    // ============================================================
    // 6. INIT
    // ============================================================

    renderTreino();
    renderDieta();
    initTabs();

    setTimeout(() => {
        const firstBody = document.querySelector('.day-body');
        if (firstBody) firstBody.classList.add('open');
    }, 100);

    console.log('🔥 Plano 92kg PWA carregado! Instale na tela inicial.');
</script>
</body>
</html>
